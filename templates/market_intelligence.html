<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Market Intelligence — Robbie</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070b12;--s1:#0d1117;--s2:#131920;--s3:#1a2030;--bd:#1e2635;--tx:#c9d1e0;--tx2:#7a8899;--tx3:#4a5568;--gr:#00d084;--rd:#ff4560;--am:#ffa500;--bl:#2979ff;--pu:#b388ff;--cy:#00e5ff;--font:'Inter',system-ui,sans-serif}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--font);overflow:hidden}
.layout{display:flex;height:100vh}
.sidebar{width:220px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--bl),var(--pu));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff}
.sb-logo-text{font-size:15px;font-weight:700}.sb-logo-text span{color:var(--cy);font-size:11px;display:block;font-weight:400;text-transform:uppercase;letter-spacing:.5px}
.sb-section{padding:10px 8px 4px;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px}
.sb-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;margin:1px 6px;font-size:13px;color:var(--tx2);cursor:pointer;text-decoration:none;transition:.12s}
.sb-link:hover{background:var(--s3);color:var(--tx)}
.sb-link.active{background:rgba(41,121,255,.12);color:var(--bl);border-left:2px solid var(--bl)}
.sb-icon{font-size:16px;width:20px;text-align:center}
.sb-bottom{margin-top:auto;padding:10px 8px;border-top:1px solid var(--bd)}
.main{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-height:0}
.topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:10}
.page-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.page-title .dot{width:8px;height:8px;border-radius:50%;background:var(--cy)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.content{flex:1;overflow-y:auto;padding:16px 16px 24px;display:flex;flex-direction:column;gap:12px;min-height:0}

/* PANEL */
.panel{background:var(--s1);border:1px solid var(--bd);border-radius:14px;min-height:80px}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.panel-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2)}
.panel-body{padding:12px 16px}
.tb-btn{padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--tx2);transition:.12s}
.tb-btn.on,.tb-btn:hover{background:var(--bl);border-color:var(--bl);color:#fff}

/* RESIZABLE CHART PANEL */
.chart-panel{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;flex-shrink:0;min-height:200px}
.chart-area{flex:1;position:relative;min-height:0}
#lwChart{width:100%;height:100%}
.resize-handle{height:8px;background:var(--s2);border-top:1px solid var(--bd);cursor:ns-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none}
.resize-handle::after{content:'';width:40px;height:2px;border-radius:1px;background:var(--tx3)}
.resize-handle:hover{background:var(--s3)}
.resize-handle:hover::after{background:var(--bl)}

/* HEATMAP */
.heatmap-scroll{overflow:visible}
.heatmap-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:12px 16px}
.hm-cell{border-radius:6px;padding:10px 8px;text-align:center;cursor:pointer;transition:.15s}
.hm-cell:hover{opacity:.85;transform:scale(1.03)}
.hm-asset{font-size:11px;font-weight:600;margin-bottom:2px}
.hm-pct{font-size:13px;font-weight:700}
.hm-price{font-size:10px;opacity:.7;margin-top:1px}

/* CORRELATION */
.corr-scroll{overflow:auto;padding:8px;width:100%;box-sizing:border-box}
.corr-grid{display:grid;gap:2px;width:100%}
.corr-cell{width:100%;min-width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:9px;font-weight:600;cursor:default}
.corr-label{font-size:9px;color:var(--tx3);display:flex;align-items:center;justify-content:flex-end;padding-right:4px;height:32px;white-space:nowrap;min-width:40px}

select{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--tx);outline:none}
.gn{color:var(--gr)}.rd{color:var(--rd)}.am{color:var(--am)}.bl{color:var(--bl)}.cy{color:var(--cy)}.mu{color:var(--tx2)}
.empty{text-align:center;padding:30px;color:var(--tx3);font-size:13px}
.skeleton{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-cell{height:70px;border-radius:6px}
.sk-row{height:36px;border-radius:4px;margin-bottom:3px}
.spinner{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.status-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(41,121,255,.15);color:var(--bl)}
.chart-controls{display:flex;gap:4px}

/* ── MOBILE HAMBURGER & SIDEBAR OVERLAY ─────────────────────────────── */
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;
  width:36px;height:36px;cursor:pointer;padding:6px;border-radius:6px;
  background:transparent;border:none;flex-shrink:0}
.hamburger span{display:block;height:2px;background:var(--tx);border-radius:2px;transition:.25s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:49;backdrop-filter:blur(2px)}
@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{position:fixed;left:-240px;top:0;height:100vh;z-index:50;
    transition:left .25s cubic-bezier(.4,0,.2,1);width:240px;
    box-shadow:4px 0 24px rgba(0,0,0,.5);overflow-y:auto}
  .sidebar.open{left:0}
  .sb-overlay.open{display:block}
  .topbar{padding:0 12px}
}

/* ── MOBILE SCROLL FIX ───────────────────────────────────────────────── */
@media(max-width:768px){
  html,body{overflow:auto!important}
  .layout{height:auto;min-height:100vh;flex-direction:column}
  .main{overflow:visible!important;height:auto}
  .content{overflow:visible!important;height:auto;display:block}
  .content>*{margin-bottom:10px}
}
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sb-logo"><div class="sb-logo-icon">R</div><div class="sb-logo-text">Robbie<span>Trading Platform</span></div></div>
    <div class="sb-section">Dashboards</div>
    <a href="/command-center" class="sb-link"><span class="sb-icon">⚡</span>Command Center</a>
    <a href="/market-intelligence" class="sb-link active"><span class="sb-icon">📊</span>Market Intel</a>
    <a href="/ai-predictions" class="sb-link"><span class="sb-icon">🤖</span>AI Predictions</a>
    <a href="/whale-intelligence" class="sb-link"><span class="sb-icon">🐋</span>Whale Intel</a>
    <a href="/sentiment-intelligence" class="sb-link"><span class="sb-icon">💬</span>Sentiment</a>
    <a href="/risk-dashboard" class="sb-link"><span class="sb-icon">🛡️</span>Risk</a>
    <a href="/strategy-lab" class="sb-link"><span class="sb-icon">🧪</span>Strategy Lab</a>

<script>
let lwChart, cSeries, vSeries, sseSource;
let _lastAsset = null, _lastTf = null, _userZoomed = false;
let currentAsset = 'EUR/USD', currentTf = '5m';
let candlesLoading = false;

// ── Fetch helper ──────────────────────────────────────────────────────────────
async function fetchWithTimeout(url, ms=20000) {
  const ctrl = new AbortController();
  const id   = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, {signal: ctrl.signal});
    clearTimeout(id);
    return r.json();
  } catch(e) {
    clearTimeout(id);
    return null;
  }
}

// ── Chart init ────────────────────────────────────────────────────────────────
function initChart() {
  lwChart = LightweightCharts.createChart(document.getElementById('lwChart'), {
    layout:    {background:{type:'solid',color:'#0d1117'}, textColor:'#7a8899'},
    grid:      {vertLines:{color:'#1a2030'}, horzLines:{color:'#1a2030'}},
    crosshair: {mode: LightweightCharts.CrosshairMode.Normal},
    rightPriceScale: {borderColor:'#1e2635', autoScale: true},
    timeScale: {borderColor:'#1e2635', timeVisible:true},
  });
  cSeries = lwChart.addCandlestickSeries({
    upColor:'#00d084', downColor:'#ff4560',
    borderVisible:false,
    wickUpColor:'#00d084', wickDownColor:'#ff4560',
  });
  vSeries = lwChart.addHistogramSeries({
    priceScaleId: '',
    scaleMargins: {top:0.85, bottom:0},
  });
  // Detect user zoom/scroll via mouse wheel and drag on chart
  const lwEl = document.getElementById('lwChart');
  lwEl.addEventListener('wheel',     () => { _userZoomed = true; }, {passive:true});
  lwEl.addEventListener('mousedown', () => { _userZoomed = true; }, {passive:true});
  lwEl.addEventListener('touchstart',() => { _userZoomed = true; }, {passive:true});

  // Auto-resize when container changes size
  new ResizeObserver(() => {
    const c = document.getElementById('lwChart');
    if (lwChart) lwChart.resize(c.clientWidth, c.clientHeight);
  }).observe(document.getElementById('lwChart'));
}

// ── Load candles — resets price scale on every asset change ──────────────────
async function loadCandles() {
  if (candlesLoading) return;
  candlesLoading = true;
  const st = document.getElementById('chartStatus');
  st.textContent = 'Loading…';
  st.style.background = 'rgba(41,121,255,.15)';
  st.style.color = 'var(--bl)';

  // Sync timeframe button states (fix timeframe display issue)
  document.querySelectorAll('.chart-controls .tb-btn').forEach(b => {
    const btnTf = b.textContent.trim();
    b.classList.toggle('on', btnTf === currentTf);
  });

  const d = await fetchWithTimeout(
    `/api/chart/candles?asset=${encodeURIComponent(currentAsset)}&interval=${currentTf}`,
    25000
  );
  candlesLoading = false;

  if (d && d.candles && d.candles.length) {
    const assetChanged = (_lastAsset !== currentAsset || _lastTf !== currentTf);
    _lastAsset = currentAsset;
    _lastTf    = currentTf;
    const usedTf = d.interval_used || currentTf;
    const isFallback = usedTf !== currentTf;

    // Save current visible range before updating data
    let savedRange = null;
    if (!assetChanged && _userZoomed) {
      try { savedRange = lwChart.timeScale().getVisibleRange(); } catch(e) {}
    }

    cSeries.setData([]);
    vSeries.setData([]);

    cSeries.setData(d.candles);
    vSeries.setData(d.candles.map(c => ({
      time:  c.time,
      value: c.volume,
      color: c.close >= c.open ? 'rgba(0,208,132,.25)' : 'rgba(255,69,96,.25)',
    })));

    if (assetChanged || !_userZoomed) {
      // New asset or first load — fit everything
      lwChart.timeScale().fitContent();
      lwChart.priceScale('right').applyOptions({autoScale: true});
      _userZoomed = false;
    } else if (savedRange) {
      // User has zoomed — restore their exact view
      try { lwChart.timeScale().setVisibleRange(savedRange); } catch(e) {}
    }

    st.textContent = isFallback
      ? `${d.candles.length} bars · requested ${currentTf}, showing ${usedTf}`
      : `${d.candles.length} bars · ${usedTf}`;
    st.style.background = isFallback ? 'rgba(255,165,0,.15)' : 'rgba(0,208,132,.12)';
    st.style.color = isFallback ? 'var(--am)' : 'var(--gr)';
  } else {
    st.textContent = `No ${currentTf} data`;
    st.style.background = 'rgba(255,69,96,.12)';
    st.style.color = 'var(--rd)';
  }
}

// ── Asset list ────────────────────────────────────────────────────────────────
let _marketIntelligenceCache = null;
async function fetchMarketIntelligenceOverview(){
  const now = Date.now();
  if(_marketIntelligenceCache && now - _marketIntelligenceCache.fetched < 10000){
    return _marketIntelligenceCache.data;
  }
  const d = await fetch('/api/page-overview?page=market_intelligence').then(r=>r.json()).catch(()=>({success:false}));
  if(d.success){
    _marketIntelligenceCache = {fetched: now, data: d};
    return d;
  }
  return {success:false};
}

async function loadAssets() {
  const page = await fetchMarketIntelligenceOverview();
  const d   = page.success ? (page.assets || {assets:[]}) : await fetchWithTimeout('/api/chart/assets', 8000) || {assets:[]};
  const sel = document.getElementById('chartAsset');
  const grouped = {};
  (d.assets || []).forEach(a => {
    (grouped[a.category] || (grouped[a.category] = [])).push(a);
  });
  sel.innerHTML = Object.entries(grouped).map(([cat, list]) =>
    `<optgroup label="${cat}">${list.map(a =>
      `<option value="${a.symbol}" ${a.symbol === currentAsset ? 'selected' : ''}>${a.symbol}</option>`
    ).join('')}</optgroup>`
  ).join('');
}

// ── Live price stream ─────────────────────────────────────────────────────────
function startStream() {
  if (sseSource) sseSource.close();
  sseSource = new EventSource(`/api/chart/stream?asset=${encodeURIComponent(currentAsset)}`);
  sseSource.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'tick') {
        const price = d.price;
        document.getElementById('livePrice').textContent =
          price ? (price < 10 ? price.toFixed(5) : price.toFixed(2)) : '—';
      }
    } catch(err) {}
  };
}

// ── Heatmap ───────────────────────────────────────────────────────────────────
async function loadHeatmap(manual=false) {
  const grid = document.getElementById('heatmapGrid');
  const st   = document.getElementById('hmStatus');
  if (manual) {
    grid.innerHTML = '<div class="hm-cell skeleton sk-cell"></div>'.repeat(10);
    st.textContent = 'Loading…';
    st.style.background = 'rgba(41,121,255,.15)';
    st.style.color = 'var(--bl)';
  }
  const page = await fetchMarketIntelligenceOverview();
  const d = page.success ? (page.heatmap || {}) : await fetchWithTimeout('/api/market/heatmap', 30000);
  if (!d || !d.items || !d.items.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:span 5">Price data loading — check back in 30s</div>';
    st.textContent = 'Unavailable';
    st.style.background = 'rgba(255,69,96,.12)';
    st.style.color = 'var(--rd)';
    return;
  }
  const max = Math.max(...d.items.map(i => Math.abs(i.change_pct)), 0.1);
  grid.innerHTML = d.items.map(i => {
    const pct  = i.change_pct || 0;
    const inten = Math.min(1, Math.abs(pct) / max);
    const bg   = pct >= 0
      ? `rgba(0,208,132,${0.08 + inten * 0.5})`
      : `rgba(255,69,96,${0.08 + inten * 0.5})`;
    const tc   = pct >= 0 ? 'var(--gr)' : 'var(--rd)';
    const sym  = i.asset.replace('-USD','').replace('/USD','').replace('=F','').replace('^','');
    return `<div class="hm-cell" style="background:${bg}" onclick="changeToAsset('${i.asset}')">
      <div class="hm-asset" style="color:var(--tx)">${sym}</div>
      <div class="hm-pct" style="color:${tc}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</div>
      <div class="hm-price">${i.price > 10 ? i.price.toFixed(2) : i.price.toFixed(5)}</div>
    </div>`;
  }).join('');
  st.textContent = `${d.items.length} assets`;
  st.style.background = 'rgba(0,208,132,.12)';
  st.style.color = 'var(--gr)';
}

// ── Correlation matrix — with retry ──────────────────────────────────────────
let corrAttempts = 0;
async function loadCorrelation(manual=false) {
  const wrap = document.getElementById('corrWrap');
  const st   = document.getElementById('corrStatus');
  if (manual) corrAttempts = 0;

  st.textContent = 'Loading…';
  st.style.background = 'rgba(41,121,255,.15)';
  st.style.color = 'var(--bl)';

  // Show skeleton while loading
  if (manual || corrAttempts === 0) {
    wrap.innerHTML = `<div style="padding:16px">
      ${'<div class="skeleton sk-row" style="width:100%;margin-bottom:4px"></div>'.repeat(8)}
    </div>`;
  }

  const d = await fetchWithTimeout('/api/correlation-matrix', 45000);
  corrAttempts++;

  if (!d || !d.labels || !d.matrix) {
    const msg = corrAttempts < 3
      ? `Fetching price history… retry ${corrAttempts}/3`
      : 'Unavailable — needs 30d price history';
    st.textContent = corrAttempts < 3 ? 'Loading…' : 'Unavailable';
    st.style.background = corrAttempts < 3 ? 'rgba(255,165,0,.15)' : 'rgba(255,69,96,.12)';
    st.style.color = corrAttempts < 3 ? 'var(--am)' : 'var(--rd)';
    wrap.innerHTML = `<div class="empty">${msg}</div>`;
    // Auto-retry up to 3 times with delay
    if (corrAttempts < 3) {
      setTimeout(() => loadCorrelation(), 15000);
    }
    return;
  }

  const cols = '48px ' + d.labels.map(() => '1fr').join(' ');
  let html = `<div class="corr-grid" style="grid-template-columns:${cols}">`;
  // Header row
  html += '<div></div>';
  d.labels.forEach(l => html +=
    `<div class="corr-cell" style="font-size:9px;color:var(--tx3);height:20px;background:none">
      ${l.replace('-USD','').replace('/USD','').replace('=F','').replace('^','')}
    </div>`
  );
  // Data rows
  d.matrix.forEach((row, i) => {
    html += `<div class="corr-label">${d.labels[i].replace('-USD','').replace('/USD','').replace('=F','').replace('^','')}</div>`;
    row.forEach((val, j) => {
      const v   = parseFloat(val);
      const abs = Math.abs(v);
      let bg;
      if (i === j)   bg = 'rgba(41,121,255,.2)';
      else if (v > 0) bg = `rgba(0,208,132,${abs * 0.8})`;
      else            bg = `rgba(255,69,96,${abs * 0.8})`;
      const tc = i === j ? 'var(--bl)' : abs > 0.5 ? (v > 0 ? 'var(--gr)' : 'var(--rd)') : 'var(--tx2)';
      html += `<div class="corr-cell" style="background:${bg};color:${tc}" title="${d.labels[i]} / ${d.labels[j]}: ${v}">${v.toFixed(2)}</div>`;
    });
  });
  html += '</div>';
  wrap.innerHTML = html;
  st.textContent = 'Updated';
  st.style.background = 'rgba(0,208,132,.12)';
  st.style.color = 'var(--gr)';
}

// ── Chart resize (drag handle) ────────────────────────────────────────────────
(function initResize() {
  const handle = document.getElementById('resizeHandle');
  const panel  = document.getElementById('chartPanel');
  let startY, startH;

  handle.addEventListener('mousedown', e => {
    startY = e.clientY;
    startH = panel.offsetHeight;
    document.body.style.cursor = 'ns-resize';
    document.body.style.userSelect = 'none';

    function onMove(ev) {
      const newH = Math.max(200, Math.min(800, startH + (ev.clientY - startY)));
      panel.style.height = newH + 'px';
      if (lwChart) {
        const c = document.getElementById('lwChart');
        lwChart.resize(c.clientWidth, c.clientHeight);
      }
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Touch support
  handle.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startH = panel.offsetHeight;
    function onMove(ev) {
      const newH = Math.max(200, Math.min(800, startH + (ev.touches[0].clientY - startY)));
      panel.style.height = newH + 'px';
      if (lwChart) {
        const c = document.getElementById('lwChart');
        lwChart.resize(c.clientWidth, c.clientHeight);
      }
    }
    function onEnd() {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    }
    document.addEventListener('touchmove', onMove);
    document.addEventListener('touchend', onEnd);
  });
})();

// ── Navigation helpers ────────────────────────────────────────────────────────
function changeToAsset(a) {
  currentAsset = a;
  const sel = document.getElementById('chartAsset');
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === a) { sel.selectedIndex = i; break; }
  }
  loadCandles();
  startStream();
}

function changeChartAsset() {
  currentAsset = document.getElementById('chartAsset').value;
  loadCandles();
  startStream();
}

function setTf(tf, el) {
  currentTf = tf;
  document.querySelectorAll('.chart-controls .tb-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  loadCandles();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
function _boot() {
  if (typeof LightweightCharts === 'undefined') {
    setTimeout(_boot, 100);  // wait for script to load
    return;
  }
  initChart();
  loadAssets().then(() => { loadCandles(); startStream(); });
  setTimeout(() => loadHeatmap(), 300);
  setTimeout(() => loadCorrelation(), 1000);
}
_boot();

// Refresh chart every 60s, heatmap every 60s
setInterval(() => { loadCandles(); }, 15000);  // 15s — responsive within-candle updates
setInterval(() => { loadHeatmap(); }, 60000);  // 60s — heatmap doesn't need to be faster
</script>
