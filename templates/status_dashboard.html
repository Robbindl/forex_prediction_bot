<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Trading Bot Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta http-equiv="refresh" content="30">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .card { transition: all 0.3s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .running { color: #10b981; font-weight: 600; }
        .stopped { color: #ef4444; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50">
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Header with Navigation -->
        <div class="mb-8">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold text-gray-900 flex items-center">
                    <i class="fas fa-heartbeat text-red-600 mr-3"></i>
                    Trading Bot Status
                </h1>
                
                <!-- Navigation Menu -->
                <div class="flex space-x-3">
                    <a href="/" class="flex items-center space-x-2 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                        <i class="fas fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="/sentiment" class="flex items-center space-x-2 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                        <i class="fas fa-newspaper"></i>
                        <span>Sentiment</span>
                    </a>
                    <a href="/backtest" class="flex items-center space-x-2 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                        <i class="fas fa-chart-bar"></i>
                        <span>Backtest</span>
                    </a>
                    <a href="/status" class="flex items-center space-x-2 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                        <i class="fas fa-heartbeat"></i>
                        <span>Status</span>
                    </a>
                </div>
            </div>
            <p class="text-gray-600 mt-2">Real-time system monitoring and performance metrics</p>
        </div>

        <!-- Last Updated -->
        <div class="text-right mb-4 text-sm text-gray-500">
            Last updated: <span id="timestamp" class="font-mono"></span>
        </div>
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card bg-white rounded-lg shadow-sm p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">💰 Account Balance</p>
                        <p class="text-3xl font-bold text-gray-900" id="balance">$20.00</p>
                    </div>
                    <div class="bg-blue-100 rounded-full p-3">
                        <i class="fas fa-wallet text-blue-600 text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="card bg-white rounded-lg shadow-sm p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">📈 Today's P&L</p>
                        <p class="text-3xl font-bold text-green-600" id="pnl">$0.00</p>
                    </div>
                    <div class="bg-green-100 rounded-full p-3">
                        <i class="fas fa-chart-line text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="card bg-white rounded-lg shadow-sm p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">📊 Open Positions</p>
                        <p class="text-3xl font-bold text-purple-600" id="open">0</p>
                    </div>
                    <div class="bg-purple-100 rounded-full p-3">
                        <i class="fas fa-briefcase text-purple-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Running Processes -->
        <div class="card bg-white rounded-lg shadow-sm p-6 mb-8">
            <h3 class="text-lg font-semibold mb-4 flex items-center">
                <i class="fas fa-microchip text-gray-600 mr-2"></i>
                🟢 Running Processes
            </h3>
            <div id="processes" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Processes will be inserted here -->
            </div>
        </div>
        
        <!-- Recent Trades -->
        <div class="card bg-white rounded-lg shadow-sm p-6">
            <h3 class="text-lg font-semibold mb-4 flex items-center">
                <i class="fas fa-history text-gray-600 mr-2"></i>
                📋 Recent Trades
            </h3>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200" id="trades">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Time</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Asset</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">P&L</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="trades-body">
                        <tr>
                            <td colspan="4" class="px-6 py-4 text-center text-gray-500">Loading trades...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function updateStatus() {
            fetch('/api/system-status')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        // Update timestamp
                        document.getElementById('timestamp').textContent = new Date().toLocaleString();
                        
                        // Update stats
                        document.getElementById('balance').textContent = '$' + data.balance;
                        document.getElementById('pnl').textContent = '$' + data.pnl;
                        document.getElementById('open').textContent = data.open_positions;
                        
                        // Show processes
                        let procHtml = '';
                        for (let [name, running] of Object.entries(data.processes)) {
                            procHtml += `
                                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                    <span class="font-medium">${name}</span>
                                    <span class="${running ? 'running' : 'stopped'}">
                                        ${running ? '✅ RUNNING' : '❌ STOPPED'}
                                    </span>
                                </div>
                            `;
                        }
                        document.getElementById('processes').innerHTML = procHtml;
                        
                        // Update trades if available
                        if (data.recent_trades && data.recent_trades.length > 0) {
                            let tradesHtml = '';
                            data.recent_trades.slice(0, 10).forEach(trade => {
                                const pnlClass = trade.pnl >= 0 ? 'text-green-600' : 'text-red-600';
                                tradesHtml += `
                                    <tr>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm">${trade.exit_time || trade.entry_time || ''}</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm">${trade.asset}</td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                                            <span class="px-2 py-1 rounded-full text-xs font-semibold ${trade.direction === 'BUY' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                                ${trade.direction || trade.signal || ''}
                                            </span>
                                        </td>
                                        <td class="px-6 py-4 whitespace-nowrap text-sm ${pnlClass}">$${trade.pnl?.toFixed(2) || '0.00'}</td>
                                    </tr>
                                `;
                            });
                            document.getElementById('trades-body').innerHTML = tradesHtml;
                        } else {
                            document.getElementById('trades-body').innerHTML = `
                                <tr>
                                    <td colspan="4" class="px-6 py-4 text-center text-gray-500">No recent trades</td>
                                </tr>
                            `;
                        }
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    document.getElementById('processes').innerHTML = '<p class="text-red-500">Error loading data</p>';
                });
        }
        
        // Update immediately and then every 30 seconds
        updateStatus();
        setInterval(updateStatus, 30000);
    </script>
</body>
</html>
