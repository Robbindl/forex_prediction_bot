version: '3.8'

services:
  trading-bot:
    build: .
    restart: unless-stopped
    command: python bot.py --balance 30 --no-gateway
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/trading_bot
      DATABASE_SSLMODE: ""
      DB_CONNECT_RETRIES: 20
      DB_RETRY_DELAY_SECONDS: 5
      PAPER_TRADES_FILE: data/paper_trades.json
      TELEGRAM_SESSION: state/whale_session
      TELEGRAM_PID_FILE: state/telegram_bot.pid
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./state:/app/state

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
