version: '3.8'

services:
  trading-bot:
    build: .
    command: python bot.py --balance 30 --no-dashboard --no-gateway
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/trading_bot
    depends_on:
      - postgres
    volumes:
      - ./data:/app/data
      - ./telegram_bot.pid:/app/telegram_bot.pid
      - ./history_session.session:/app/history_session.session
      - ./whale_session.session:/app/whale_session.session

  web-dashboard:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/trading_bot
    depends_on:
      - postgres
    volumes:
      - ./data:/app/data
      - ./telegram_bot.pid:/app/telegram_bot.pid
      - ./history_session.session:/app/history_session.session
      - ./whale_session.session:/app/whale_session.session

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
