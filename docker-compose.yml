version: '3.8'

services:
  master-controller:
    image: trading-bot
    container_name: master-controller
    restart: unless-stopped
    volumes:
      - ./ml_models:/app/ml_models
      - ./logs:/app/logs
      - ./paper_trades.json:/app/paper_trades.json
      - ./.env:/app/.env
      - ./config:/app/config
    command: python master_controller.py
    networks:
      - trading-network

  trading-bot:
    image: trading-bot
    container_name: trading-bot
    restart: unless-stopped
    volumes:
      - ./ml_models:/app/ml_models
      - ./logs:/app/logs
      - ./paper_trades.json:/app/paper_trades.json
      - ./.env:/app/.env
      - ./config:/app/config
    command: python trading_system.py --mode live --balance 30 --strategy-mode voting
    networks:
      - trading-network
    depends_on:
      - master-controller

  web-dashboard:
    image: trading-bot
    container_name: web-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./paper_trades.json:/app/paper_trades.json
      - ./.env:/app/.env
      - ./config:/app/config
      - ./web_launcher.py:/app/web_launcher.py
    command: python web_launcher.py
    networks:
      - trading-network
    depends_on:
      - trading-bot

  perf-dashboard:
    image: trading-bot
    container_name: perf-dashboard
    restart: unless-stopped
    ports:
      - "8050:8050"
    volumes:
      - ./logs:/app/logs
      - ./paper_trades.json:/app/paper_trades.json
      - ./.env:/app/.env
      - ./config:/app/config
    command: python performance_dashboard.py
    networks:
      - trading-network
    depends_on:
      - trading-bot

networks:
  trading-network:
    driver: bridge