version: '3.8'

services:
  trading-bot:
    image: trading-bot
    container_name: trading-bot
    restart: unless-stopped
    volumes:
      - ./ml_models:/app/ml_models
      - ./logs:/app/logs
      - ./paper_trades.json:/app/paper_trades.json
      - ./.env:/app/.env
      - ./config:/app/config
    command: python bot.py --balance 30
    networks:
      - trading-network

  web-dashboard:
    image: trading-bot
    container_name: web-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
      - ./paper_trades.json:/app/paper_trades.json
      - ./.env:/app/.env
      - ./config:/app/config
    command: python -m dashboard.web_app_live
    networks:
      - trading-network
    depends_on:
      - trading-bot

networks:
  trading-network:
    driver: bridge
